name: Update dashboard data

on:
  # 매일 06:00 KST(= 전날 21:00 UTC) 자동 갱신 — 방문자 + 소비 데이터 통합.
  # 로컬(Mac) 스케줄 작업은 은퇴(샌드박스에서 SSH/API 키 접근 불가). 이 워크플로가 단일 소스.
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}     # 수동 실행 버튼

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch visitor data from data.go.kr
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          ANCHOR_AREA_CD: ${{ vars.ANCHOR_AREA_CD }}
          ANCHOR_SIGNGU_CD: ${{ vars.ANCHOR_SIGNGU_CD }}
        run: python scripts/fetch_data.py

      - name: Fetch consume data from data.go.kr
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python scripts/fetch_consume.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-update dashboard data ($(date -u +%Y-%m-%d))"
          git push
