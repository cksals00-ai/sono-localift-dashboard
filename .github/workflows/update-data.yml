name: Update dashboard data

on:
  # 매일 자동 갱신은 로컬(Mac) 스케줄 작업 'datalab-dashboard-daily-refresh'가 단일 소스로 담당한다.
  # (schedule 트리거는 은퇴 — 중복 push 충돌 및 실패 알림 방지). 필요 시 아래 버튼으로 수동 실행.
  workflow_dispatch: {}     # 수동 실행 버튼

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest data from data.go.kr
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          ANCHOR_AREA_CD: ${{ vars.ANCHOR_AREA_CD }}
          ANCHOR_SIGNGU_CD: ${{ vars.ANCHOR_SIGNGU_CD }}
        run: python scripts/fetch_data.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json
          git diff --staged --quiet || git commit -m "chore: auto-update dashboard data ($(date -u +%Y-%m-%d))"
          git push
